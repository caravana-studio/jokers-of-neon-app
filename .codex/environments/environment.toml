[setup]
script = '''
set -e

ENV_SRC="$HOME/.config/jokers-of-neon/.env"
CERT_SRC="$HOME/.config/jokers-of-neon/.cert"

# linkea el .env compartido si no existe en el worktree
if [ -f "$ENV_SRC" ] && [ ! -e ".env" ]; then
  ln -s "$ENV_SRC" .env || cp "$ENV_SRC" .env
fi

